<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脆薯饼仓库</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="app-container" id="app">
    <!-- 主页视图 -->
    <div id="homeView" class="view">
        <div class="hero">
            <div class="avatar-wrapper" id="avatarUpload">
                <img id="avatarImg" class="avatar-img" src="https://picsum.photos/id/20/120/120" alt="avatar">
            </div>
            <h1>脆薯饼</h1>
            <div class="bio">家产99</div>
        </div>
        <div class="section-header">
            <h2 class="section-title"><i class="fas fa-folder-tree"></i> 我的文件夹</h2>
            <button class="btn-outline" id="newRootFolderBtn"><i class="fas fa-folder fa-2x"></i> 新建文件夹</button>
        </div>
        <div id="rootFoldersGrid" class="folders-grid"></div>
    </div>

    <!-- 文件夹详情视图 -->
    <div id="folderView" class="view" style="display: none;">
        <div class="detail-header">
            <button class="btn-outline" id="backHomeBtn"><i class="fas fa-arrow-left"></i> 返回主页</button>
            <div class="breadcrumb" id="breadcrumb"></div>
            <button class="btn-outline" id="editCurrentFolderBtn"><i class="fas fa-edit"></i> 重命名</button>
        </div>

        <!-- 新建子文件夹 & 上传文件 -->
        <div class="upload-area">
            <div style="display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1rem;">
                <button class="btn-primary" id="newSubFolderBtn"><i class="fas fa-folder-plus"></i> 新建子文件夹</button>
                <button class="btn-primary" id="uploadFileBtn"><i class="fas fa-upload"></i> 上传文件</button>
            </div>
            <div id="uploadForm" style="display: none; margin-top: 1rem;">
                <div class="form-row">
                    <div class="form-group">
                        <label>文件 (图片/文本)</label>
                        <input type="file" id="fileInput" accept="image/*,text/plain">
                    </div>
                    <div class="form-group">
                        <label>标题</label>
                        <input type="text" id="fileTitle" placeholder="标题">
                    </div>
                    <div class="form-group">
                        <label>简介</label>
                        <textarea id="fileDesc" rows="2" placeholder="简短描述..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>创作时间</label>
                        <input type="datetime-local" id="fileTime">
                    </div>
                    <button class="btn-primary" id="confirmUpload">确认上传</button>
                </div>
            </div>
        </div>

        <h3 style="margin: 1rem 0 0.8rem;"><i class="fas fa-layer-group"></i> 内容</h3>
        <div id="itemsContainer" class="items-grid"></div>
    </div>
</div>

<!-- 预览模态框 -->
<div id="previewModal" class="modal-mask">
    <div class="modal-container" id="modalContent">
        <!-- 动态内容 -->
    </div>
</div>

<script>
    // ---------- 数据模型 ----------
    const STORAGE_KEY = 'LofterBlogData';
    // 默认根文件夹 (根是一个虚拟节点，但存储时根下存文件夹)
    let rootData = {
        id: 'root',
        name: 'root',
        type: 'folder',
        children: []   // 直接存放用户创建的顶级文件夹
    };

    // 辅助函数
    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substring(2, 10);
    }

    // 加载数据
    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                const data = JSON.parse(stored);
                rootData = data;
            } catch(e) { console.warn(e); }
        } else {
            // 创建示例数据
            const demoFolder = {
                id: generateId(),
                name: '📁 JACKJEANNE',
                type: 'folder',
                children: [],
                files: [
                    {
                        id: generateId(),
                        type: 'file',
                        name: '傍晚的雨.txt',
                        fileType: 'text/plain',
                        title: '雨后小记',
                        description: '关于一场春雨的碎念',
                        content: '雨丝很细，像旧毛衣上脱落的线头。',
                        createdAt: '2025-02-15T19:30',
                        dataUrl: null
                    },
                ]
            };
            rootData.children = [demoFolder];
        }
        // 确保每个文件有 title/description 字段
        normalizeData(rootData);
        saveData();
    }

    function normalizeData(node) {
        if (node.type === 'folder') {
            if (!node.children) node.children = [];
            if (!node.files) node.files = [];
            node.children.forEach(c => normalizeData(c));
            node.files.forEach(f => {
                if (!f.title) f.title = f.name.split('.')[0];
                if (!f.description) f.description = '';
                if (f.fileType === 'text/plain' && !f.content) f.content = '（无内容）';
            });
        }
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(rootData));
    }

    // 查找当前路径对应的节点 (path 是文件夹id数组，从根开始)
    function getNodeByPath(pathIds) {
        let current = rootData;
        for (let id of pathIds) {
            if (current.type === 'folder') {
                const found = current.children.find(c => c.id === id);
                if (found) current = found;
                else return null;
            } else return null;
        }
        return current;
    }

    let currentPath = []; // 存储当前文件夹的id路径 (不包含根)
    let currentFolderNode = null;

    // DOM 元素
    const homeView = document.getElementById('homeView');
    const folderView = document.getElementById('folderView');
    const rootGrid = document.getElementById('rootFoldersGrid');
    const itemsContainer = document.getElementById('itemsContainer');
    const breadcrumb = document.getElementById('breadcrumb');
    const backHomeBtn = document.getElementById('backHomeBtn');
    const newRootFolderBtn = document.getElementById('newRootFolderBtn');
    const newSubFolderBtn = document.getElementById('newSubFolderBtn');
    const uploadFileBtn = document.getElementById('uploadFileBtn');
    const uploadForm = document.getElementById('uploadForm');
    const fileInput = document.getElementById('fileInput');
    const fileTitle = document.getElementById('fileTitle');
    const fileDesc = document.getElementById('fileDesc');
    const fileTime = document.getElementById('fileTime');
    const confirmUpload = document.getElementById('confirmUpload');
    const editCurrentFolderBtn = document.getElementById('editCurrentFolderBtn');

    // 头像上传
    const avatarUpload = document.getElementById('avatarUpload');
    const avatarImg = document.getElementById('avatarImg');
    function loadAvatar() {
        const saved = localStorage.getItem('userAvatar');
        if (saved) avatarImg.src = saved;
    }
    avatarUpload.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    avatarImg.src = ev.target.result;
                    localStorage.setItem('userAvatar', ev.target.result);
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    });

    // 渲染主页根文件夹
    function renderHome() {
        rootGrid.innerHTML = '';
        if (!rootData.children.length) {
            rootGrid.innerHTML = '<div class="empty-message"><i class="far fa-folder-open"></i> 暂无文件夹，点击“新建文件夹”开始</div>';
            return;
        }
        rootData.children.forEach(folder => {
            const card = document.createElement('div');
            card.className = 'folder-card';
            card.innerHTML = `
                <div class="folder-icon-large"><i class="fas fa-folder"></i></div>
                <div class="folder-name">${escapeHtml(folder.name)}</div>
                <div class="folder-meta">${folder.children?.length || 0} 子文件夹 · ${folder.files?.length || 0} 文件</div>
            `;
            card.addEventListener('click', () => openFolder([folder.id]));
            rootGrid.appendChild(card);
        });
    }

    function openFolder(pathIds) {
        const node = getNodeByPath(pathIds);
        if (!node || node.type !== 'folder') return;
        currentPath = pathIds;
        currentFolderNode = node;
        renderFolderDetail();
        homeView.style.display = 'none';
        folderView.style.display = 'block';
        // 更新面包屑
        updateBreadcrumb();
    }

    function updateBreadcrumb() {
        breadcrumb.innerHTML = '';
        let accPath = [];
        breadcrumb.appendChild(createBreadcrumbItem('根目录', () => {
            homeView.style.display = 'block';
            folderView.style.display = 'none';
            renderHome();
        }));
        for (let i = 0; i < currentPath.length; i++) {
            const id = currentPath[i];
            accPath.push(id);
            const folder = getNodeByPath(accPath);
            if (folder) {
                breadcrumb.appendChild(document.createTextNode(' / '));
                breadcrumb.appendChild(createBreadcrumbItem(folder.name, () => openFolder(accPath.slice())));
            }
        }
    }
    function createBreadcrumbItem(text, onClick) {
        const span = document.createElement('span');
        span.textContent = text;
        span.style.cursor = 'pointer';
        span.style.color = '#F3C382';
        span.addEventListener('click', onClick);
        return span;
    }

    function renderFolderDetail() {
        if (!currentFolderNode) return;
        itemsContainer.innerHTML = '';
        // 渲染子文件夹
        if (currentFolderNode.children.length) {
            currentFolderNode.children.forEach(sub => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="item-preview" style="background:#EADCCE;"><i class="fas fa-folder-open" style="font-size: 2.5rem; color:#F3C382;"></i></div>
                    <div class="item-title">📁 ${escapeHtml(sub.name)}</div>
                    <div class="item-desc">${sub.children?.length || 0} 个子文件夹 · ${sub.files?.length || 0} 个文件</div>
                    <div class="item-actions">
                        <button class="btn-icon edit-folder" data-id="${sub.id}" title="重命名"><i class="fas fa-edit"></i></button>
                        <button class="btn-icon delete-folder" data-id="${sub.id}" title="删除"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.edit-folder') || e.target.closest('.delete-folder')) return;
                    openFolder([...currentPath, sub.id]);
                });
                card.querySelector('.edit-folder').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const newName = prompt('新名称', sub.name);
                    if (newName) { sub.name = newName; saveData(); renderFolderDetail(); renderHome(); updateBreadcrumb(); }
                });
                card.querySelector('.delete-folder').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm(`删除文件夹“${sub.name}”?`)) {
                        const idx = currentFolderNode.children.findIndex(c => c.id === sub.id);
                        if (idx !== -1) currentFolderNode.children.splice(idx, 1);
                        saveData(); renderFolderDetail(); renderHome();
                        if (currentFolderNode.children.length === 0 && currentFolderNode.files.length === 0) itemsContainer.innerHTML = '<div class="empty-message">暂无内容</div>';
                    }
                });
                itemsContainer.appendChild(card);
            });
        }
        // 渲染文件
        if (currentFolderNode.files.length) {
            currentFolderNode.files.forEach(file => {
                const card = document.createElement('div');
                card.className = 'item-card';
                let previewHtml = '';
                if (file.fileType.startsWith('image/')) {
                    previewHtml = `<div class="item-preview"><img src="${file.dataUrl || 'https://via.placeholder.com/200?text=No+Image'}" alt="preview"></div>`;
                } else {
                    previewHtml = `<div class="item-preview text-preview"><i class="fas fa-file-alt" style="font-size: 2rem; color:#F3C382;"></i></div>`;
                }
                card.innerHTML = `
                    ${previewHtml}
                    <div class="item-title">${escapeHtml(file.title || file.name)}</div>
                    <div class="item-desc">${escapeHtml(file.description || '')}</div>
                    <div class="item-actions">
                        <button class="btn-icon edit-file" data-id="${file.id}" title="编辑"><i class="fas fa-pen"></i></button>
                        <button class="btn-icon delete-file" data-id="${file.id}" title="删除"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.edit-file') || e.target.closest('.delete-file')) return;
                    openPreviewModal(file);
                });
                card.querySelector('.edit-file').addEventListener('click', (e) => {
                    e.stopPropagation();
                    editFileModal(file);
                });
                card.querySelector('.delete-file').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm(`删除文件“${file.name}”?`)) {
                        const idx = currentFolderNode.files.findIndex(f => f.id === file.id);
                        if (idx !== -1) currentFolderNode.files.splice(idx, 1);
                        saveData(); renderFolderDetail(); renderHome();
                    }
                });
                itemsContainer.appendChild(card);
            });
        }
        if (currentFolderNode.children.length === 0 && currentFolderNode.files.length === 0) {
            itemsContainer.innerHTML = '<div class="empty-message"><i class="far fa-folder-open"></i> 文件夹为空，上传文件或新建子文件夹吧~</div>';
        }
    }

    function openPreviewModal(file) {
        const modal = document.getElementById('previewModal');
        const modalContent = document.getElementById('modalContent');
        if (file.fileType.startsWith('image/')) {
            modalContent.innerHTML = `
                <img src="${file.dataUrl}" alt="${file.title}" style="max-width:100%; max-height:60vh;">
                <div style="margin-top:1rem"><strong>${escapeHtml(file.title)}</strong><br>${escapeHtml(file.description)}<br><small>${file.createdAt}</small></div>
                <div class="modal-buttons"><button class="btn-outline" id="closeModal">关闭</button></div>
            `;
        } else {
            modalContent.innerHTML = `
                <h3>${escapeHtml(file.title)}</h3>
                <p><em>${escapeHtml(file.description)}</em></p>
                <div style="background:#F9F2EA; padding:0.8rem; border-radius:0.8rem; margin:0.8rem 0; white-space:pre-wrap;">${escapeHtml(file.content || '暂无正文')}</div>
                <div class="modal-buttons"><button class="btn-outline" id="closeModal">关闭</button></div>
            `;
        }
        modal.classList.add('active');
        document.getElementById('closeModal').addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
    }

    function editFileModal(file) {
        const modal = document.getElementById('previewModal');
        const modalContent = document.getElementById('modalContent');
        modalContent.innerHTML = `
            <h3>编辑文件信息</h3>
            <div class="form-group"><label>标题</label><input id="editTitle" value="${escapeHtml(file.title)}"></div>
            <div class="form-group"><label>简介</label><textarea id="editDesc" rows="2">${escapeHtml(file.description)}</textarea></div>
            ${file.fileType === 'text/plain' ? `<div class="form-group"><label>正文内容</label><textarea id="editContent" rows="6">${escapeHtml(file.content || '')}</textarea></div>` : ''}
            <div class="modal-buttons">
                <button class="btn-outline" id="saveEdit">保存</button>
                <button class="btn-outline" id="closeEditModal">取消</button>
            </div>
        `;
        modal.classList.add('active');
        document.getElementById('saveEdit').addEventListener('click', () => {
            file.title = document.getElementById('editTitle').value;
            file.description = document.getElementById('editDesc').value;
            if (file.fileType === 'text/plain' && document.getElementById('editContent')) {
                file.content = document.getElementById('editContent').value;
            }
            saveData(); renderFolderDetail(); renderHome();
            modal.classList.remove('active');
        });
        document.getElementById('closeEditModal').addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
    }

    // 新建文件夹
    function createNewFolder(parentNode, isRoot = false) {
        let name = prompt('文件夹名称', '未命名');
        if (!name) return;
        const newFolder = {
            id: generateId(),
            name: name,
            type: 'folder',
            children: [],
            files: []
        };
        if (isRoot) {
            rootData.children.push(newFolder);
        } else {
            parentNode.children.push(newFolder);
        }
        saveData();
        if (isRoot) renderHome();
        else renderFolderDetail();
    }
    newRootFolderBtn.addEventListener('click', () => createNewFolder(rootData, true));
    newSubFolderBtn.addEventListener('click', () => createNewFolder(currentFolderNode, false));

    // 上传文件 UI 切换
    uploadFileBtn.addEventListener('click', () => {
        uploadForm.style.display = uploadForm.style.display === 'none' ? 'block' : 'none';
    });
    confirmUpload.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) { alert('请选择文件'); return; }
        const title = fileTitle.value.trim() || file.name;
        const description = fileDesc.value;
        let time = fileTime.value;
        if (!time) time = new Date().toISOString().slice(0,16);
        const reader = new FileReader();
        reader.onload = (e) => {
            const dataUrl = e.target.result;
            const newFile = {
                id: generateId(),
                type: 'file',
                name: file.name,
                fileType: file.type,
                title: title,
                description: description,
                createdAt: time,
                dataUrl: dataUrl,
                content: file.type === 'text/plain' ? dataUrl.split(',')[1] ? atob(dataUrl.split(',')[1]) : '' : ''
            };
            if (file.type === 'text/plain') {
                newFile.content = dataUrl.split(',')[1] ? decodeURIComponent(escape(atob(dataUrl.split(',')[1]))) : '';
            }
            currentFolderNode.files.push(newFile);
            saveData();
            renderFolderDetail();
            renderHome();
            uploadForm.style.display = 'none';
            fileInput.value = '';
            fileTitle.value = '';
            fileDesc.value = '';
        };
        reader.readAsDataURL(file);
    });

    editCurrentFolderBtn.addEventListener('click', () => {
        const newName = prompt('重命名文件夹', currentFolderNode.name);
        if (newName) { currentFolderNode.name = newName; saveData(); renderFolderDetail(); renderHome(); updateBreadcrumb(); }
    });
    backHomeBtn.addEventListener('click', () => {
        homeView.style.display = 'block';
        folderView.style.display = 'none';
        renderHome();
    });

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    loadData();
    loadAvatar();
    renderHome();
</script>
</body>
</html>
